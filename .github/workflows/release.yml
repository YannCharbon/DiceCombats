name: Build and Release DiceCombats

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_PATH: DiceCombats/DiceCombats.csproj
  WINDOWS_TFM: net10.0-windows10.0.19041.0
  WINDOWS_RID: win-x64
  ANDROID_TFM: net10.0-android

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install .NET MAUI Workloads
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        dotnet workload install maui-windows maui-android --ignore-failed-sources
        dotnet workload list

    - name: Determine AssemblyVersion
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        if ($env:GITHUB_REF -like "refs/tags/*") {
          $tagVersion = $env:GITHUB_REF -replace "^refs/tags/", ""
          Write-Host "Tag version detected: $tagVersion"

          $cleanVersion = $tagVersion -replace "^v", ""
          $assemblyVersion = "$cleanVersion.0"

          "assembly_version=$assemblyVersion" >> $env:GITHUB_ENV
          "tag_version=$cleanVersion" >> $env:GITHUB_ENV
        }
        else {
          Write-Host "Manual trigger detected. Setting AssemblyVersion to 999.999.999.0"

          "assembly_version=999.999.999.0" >> $env:GITHUB_ENV
          "tag_version=dev-$env:GITHUB_RUN_NUMBER" >> $env:GITHUB_ENV
        }

    - name: Update AssemblyVersion in .csproj
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $csprojPath = "${{ env.PROJECT_PATH }}"
        $assemblyVersion = "${{ env.assembly_version }}"

        $content = Get-Content $csprojPath -Raw

        if ($content -match "<AssemblyVersion>.*?</AssemblyVersion>") {
          $content = [regex]::Replace(
            $content,
            "<AssemblyVersion>.*?</AssemblyVersion>",
            "<AssemblyVersion>$assemblyVersion</AssemblyVersion>"
          )
        }
        else {
          $content = $content -replace "</Project>", "  <PropertyGroup>`n    <AssemblyVersion>$assemblyVersion</AssemblyVersion>`n  </PropertyGroup>`n</Project>"
        }

        Set-Content -Path $csprojPath -Value $content -NoNewline

    - name: Copy RELEASE_NOTES.md to wwwroot
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        Copy-Item -Force RELEASE_NOTES.md DiceCombats/wwwroot/

    - name: Publish Windows
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        dotnet publish $env:PROJECT_PATH `
          -f $env:WINDOWS_TFM `
          -c Release `
          -p:TargetFrameworks=$env:WINDOWS_TFM `
          -p:RuntimeIdentifierOverride=$env:WINDOWS_RID `
          -p:RuntimeIdentifiers=$env:WINDOWS_RID `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true `
          -p:SelfContained=true `
          -p:IncludeAllContentForSelfExtract=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishReadyToRun=true `
          -o ./publish/windows

    - name: Decode and Save Certificate PFX
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        if ([string]::IsNullOrWhiteSpace("${{ secrets.WIN_CERTIFICATE_B64 }}")) {
          throw "WIN_CERTIFICATE_B64 secret is missing or empty."
        }

        $certBase64 = "${{ secrets.WIN_CERTIFICATE_B64 }}"
        $certBytes = [System.Convert]::FromBase64String($certBase64)
        $certPath = "$env:USERPROFILE\mycert.pfx"

        [System.IO.File]::WriteAllBytes($certPath, $certBytes)

        "pfx_path=$certPath" >> $env:GITHUB_ENV

    - name: Add signtool to PATH
      uses: KamaranL/add-signtool-action@v1

    - name: Sign Windows Executables
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        if ([string]::IsNullOrWhiteSpace("${{ secrets.WIN_CERTIFICATE_PASSWORD }}")) {
          throw "WIN_CERTIFICATE_PASSWORD secret is missing or empty."
        }

        $exeFiles = Get-ChildItem -Path ./publish/windows -Filter *.exe -Recurse

        if (-not $exeFiles) {
          throw "No Windows .exe files found in ./publish/windows."
        }

        foreach ($exe in $exeFiles) {
          signtool sign `
            /f "${{ env.pfx_path }}" `
            /p "${{ secrets.WIN_CERTIFICATE_PASSWORD }}" `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            "$($exe.FullName)"
        }

    - name: Create release directory
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        New-Item -ItemType Directory -Force -Path ./publish/release

    - name: Create Zip of Windows Build
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        if (-not (Test-Path "./publish/windows")) {
          throw "Windows publish directory not found."
        }

        $zipPath = "./publish/release/DiceCombats-${{ env.tag_version }}-Windows.zip"

        Compress-Archive -Path ./publish/windows/* -DestinationPath $zipPath -Force

        "zip_path=$zipPath" >> $env:GITHUB_ENV

    - name: Publish Android APK
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        dotnet publish $env:PROJECT_PATH `
          -f $env:ANDROID_TFM `
          -c Release `
          -p:TargetFrameworks=$env:ANDROID_TFM `
          -p:AndroidPackageFormat=apk `
          -o ./publish/android

    - name: Find and copy APK file
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $apkFile = Get-ChildItem -Path ./publish/android -Filter *.apk -Recurse | Select-Object -First 1

        if (-not $apkFile) {
          throw "No APK file found in ./publish/android."
        }

        $releaseApkPath = "./publish/release/DiceCombats-${{ env.tag_version }}-Android.apk"

        Copy-Item -Force $apkFile.FullName $releaseApkPath

        "apk_file=$releaseApkPath" >> $env:GITHUB_ENV

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DiceCombats-Builds-${{ env.tag_version }}
        path: ./publish/release/*

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.ref_name }}
        name: DiceCombats ${{ env.tag_version }}
        bodyFile: RELEASE_NOTES.md
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ./publish/release/*
        artifactErrorsFailBuild: true
        allowUpdates: true
        replacesArtifacts: true